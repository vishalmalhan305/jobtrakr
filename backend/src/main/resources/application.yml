spring:
  application:
    name: backend

  profiles:
    active: local

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/jobtrakr}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

logging:
  level:
    root: INFO
    org.flywaydb: DEBUG
    com.yourpackage: DEBUG
